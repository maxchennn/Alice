<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Alice Era | Gallery</title>
    <style>
        :root { --main-color: #ffb7c5; --bg-color: #0d0d0d; }
        body { background: var(--bg-color); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .header { padding: 60px 20px; text-align: center; background: radial-gradient(circle at center, #ffb7c510 0%, transparent 80%); }
        h1 { font-size: 3.5rem; text-shadow: 0 0 25px var(--main-color); margin: 0; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; padding: 20px; max-width: 1300px; margin: 0 auto; }
        .card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 183, 197, 0.1); border-radius: 18px; overflow: hidden; transition: 0.4s; backdrop-filter: blur(10px); }
        .card:hover { transform: translateY(-10px); border-color: var(--main-color); box-shadow: 0 15px 35px rgba(255, 183, 197, 0.15); }
        .img-container { width: 100%; height: 220px; background: #1a1a1a; overflow: hidden; }
        img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 15px; text-align: center; }
        .download-btn { background: var(--main-color); color: #121212; text-decoration: none; padding: 10px 25px; border-radius: 25px; font-weight: 900; display: inline-block; text-transform: uppercase; font-size: 0.8rem; }
        .download-btn:hover { opacity: 0.85; transform: scale(1.05); transition: 0.2s; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌸 Alice Era 🌸</h1>
        <p style="opacity: 0.6;">Wallpapers for vroomies &lt;3</p>
    </div>
    <div id="gallery" class="gallery"></div>
    <script>
        const gallery = document.getElementById('gallery');
        const images = [
            "1.jpg","2.jpg","3.png","4.png","5.jpg","6.jpg","7.jpg","8.png","9.png","10.png",
            "11.png","12.png","13.png","14.jpg","15.jpg","16.png","17.png","18.png","19.png","20.png",
            "21.png","22.png","23.png","24.png","25.png","26.png","27.png","28.jpg","29.png","30.png",
            "31.png","32.png","33.png","34.png","35.png","36.png","37.png","38.png","39.png","40.jpg",
            "41.jpg","42.jpg","43.png","44.png","45.jpg","46.png","47.jpg","48.png","49.png","50.png",
            "51.png","52.png","53.png","54.png","55.jpg","56.png","57.png","58.png","59.png","60.png",
            "61.png","62.png","63.png","64.png","65.png","66.png","67.png","68.png","69.jpg","70.jpg",
            "71.jpg","72.jpg","73.png","74.png","75.png","76.png"
        ];

        images.forEach(filename => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="img-container">
                    <img src="${filename}" alt="${filename}">
                </div>
                <div class="card-info">
                    <a href="${filename}" download class="download-btn">DOWNLOAD</a>
                </div>
            `;
            gallery.appendChild(card);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>🌸 Alice Era | Wallpaper Gallery</title>
    <style>
        :root { --main-color: #ffb7c5; --bg-color: #121212; }
        body { background: var(--bg-color); color: white; font-family: 'Inter', sans-serif; }
        .header { padding: 50px; text-align: center; background: linear-gradient(transparent, #ffb7c522); }
        h1 { font-size: 3rem; text-shadow: 0 0 20px var(--main-color); }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px; }
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 183, 197, 0.3);
            border-radius: 15px; overflow: hidden; transition: 0.4s;
            backdrop-filter: blur(10px);
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 10px 30px rgba(255, 183, 197, 0.4); }
        img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 15px; text-align: center; }
        button { background: var(--main-color); border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌸 Alice Era 🌸</h1>
        <p>Emir Osman'ın Linux Dünyasından Seçme Duvar Kağıtları</p>
    </div>
    <div class="gallery">
        <div class="card">
            <img src="wall1.png">
            <div class="card-info"><button>Download</button></div>
        </div>
    </div>
</body>
</html>
